<svg width="960" height="520" viewBox="0 0 960 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Progress Tracking Data Flow</title>
  <desc id="desc">React sends a progress update to Express. The API validates the JWT, checks the problem, upserts user progress in MongoDB, and returns the saved record.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb" />
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b" />
    </marker>
    <style>
      .lane { stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 8; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .primary { fill: #eff6ff; stroke: #2563eb; }
      .db { fill: #f0fdf4; stroke: #16a34a; }
      .label { fill: #0f172a; font: 600 18px Arial, sans-serif; }
      .sub { fill: #475569; font: 14px Arial, sans-serif; }
      .step { fill: #0f172a; font: 15px Arial, sans-serif; }
      .line { stroke: #2563eb; stroke-width: 2.5; marker-end: url(#arrow); }
      .return { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 7 7; marker-end: url(#arrow-gray); }
    </style>
  </defs>

  <rect x="24" y="24" width="912" height="472" rx="26" fill="#f8fafc" stroke="#e2e8f0" />
  <text x="48" y="62" class="label">Progress Tracking Data Flow</text>
  <text x="48" y="86" class="sub">Each saved checkbox state belongs to one authenticated user and one problem.</text>

  <rect x="78" y="118" width="170" height="76" class="box primary" />
  <text x="119" y="149" class="label">React Client</text>
  <text x="109" y="172" class="sub">Sheet checkbox</text>

  <rect x="395" y="118" width="170" height="76" class="box primary" />
  <text x="438" y="149" class="label">Express API</text>
  <text x="426" y="172" class="sub">Protected route</text>

  <rect x="712" y="118" width="170" height="76" class="box db" />
  <text x="754" y="149" class="label">MongoDB</text>
  <text x="742" y="172" class="sub">UserProgress</text>

  <line x1="163" y1="194" x2="163" y2="450" class="lane" />
  <line x1="480" y1="194" x2="480" y2="450" class="lane" />
  <line x1="797" y1="194" x2="797" y2="450" class="lane" />

  <line x1="163" y1="230" x2="480" y2="230" class="line" />
  <text x="222" y="216" class="step">PUT /api/progress/:problemId</text>

  <path d="M480 264 C540 264 540 306 480 306 C420 306 420 264 480 264" class="line" />
  <text x="514" y="289" class="step">Validate JWT and problem id</text>

  <line x1="480" y1="342" x2="797" y2="342" class="line" />
  <text x="574" y="328" class="step">Find problem</text>

  <line x1="480" y1="384" x2="797" y2="384" class="line" />
  <text x="548" y="370" class="step">Upsert UserProgress record</text>

  <line x1="797" y1="424" x2="480" y2="424" class="return" />
  <text x="580" y="410" class="step">Saved progress</text>

  <line x1="480" y1="462" x2="163" y2="462" class="return" />
  <text x="214" y="448" class="step">Updated progress response</text>
</svg>
